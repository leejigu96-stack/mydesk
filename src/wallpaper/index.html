<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MyDesk Wallpaper</title>
<link rel="stylesheet" href="../common/style.css">
<style>
html, body {
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background: black;
  margin: 0;
  padding: 0;
}

/* 배경 = 캔버스 (셰이더 또는 동영상) */
#bg-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

video.bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* 상단 컨트롤 (마우스 위에 갈 때만 표시) */
.controls {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg-glass);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-md);
  z-index: 100;
  transition: transform 0.3s var(--ease);
}

body:hover .controls { transform: translateX(-50%) translateY(0); }

.control-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s var(--ease);
}

.control-btn:hover { background: var(--bg-glass-light); }

/* 정보 패널 (왼쪽 아래) */
.info-panel {
  position: fixed;
  bottom: 80px;
  left: 24px;
  padding: 16px 20px;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  z-index: 50;
  opacity: 0;
  transition: opacity 0.3s var(--ease);
}

body:hover .info-panel { opacity: 1; }

.info-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.info-meta { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="controls">
  <button class="control-btn" title="이전" id="prev">⏮</button>
  <button class="control-btn" title="재생/정지" id="play">⏸</button>
  <button class="control-btn" title="다음" id="next">⏭</button>
  <button class="control-btn" title="음소거" id="mute">🔇</button>
  <button class="control-btn" title="설정" id="settings">⚙️</button>
</div>

<div class="info-panel">
  <div class="info-title" id="info-title">우주 (Cosmos)</div>
  <div class="info-meta" id="info-meta">셰이더 · 60fps · GPU 3%</div>
</div>

<script>
// 셰이더 기반 우주 애니메이션 (Canvas 2D, 가벼움)
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
let running = true;
let animationId;

function resize() {
  canvas.width = window.innerWidth * window.devicePixelRatio;
  canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  initStars();
}

function initStars() {
  stars = [];
  const count = 200;
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      z: Math.random() * 1500,
      size: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.02 + Math.random() * 0.03,
    });
  }
}

function draw() {
  // 그라데이션 배경 (보라 → 짙은 남색)
  const grad = ctx.createRadialGradient(
    window.innerWidth / 2, window.innerHeight / 2, 0,
    window.innerWidth / 2, window.innerHeight / 2, window.innerWidth / 1.5
  );
  grad.addColorStop(0, '#1a1147');
  grad.addColorStop(0.5, '#0f0a2e');
  grad.addColorStop(1, '#000005');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  // 별
  stars.forEach(star => {
    star.twinkle += star.twinkleSpeed;
    star.z -= 1.5;
    if (star.z < 0) {
      star.z = 1500;
      star.x = Math.random() * window.innerWidth;
      star.y = Math.random() * window.innerHeight;
    }

    const k = 200 / star.z;
    const px = (star.x - window.innerWidth / 2) * k + window.innerWidth / 2;
    const py = (star.y - window.innerHeight / 2) * k + window.innerHeight / 2;

    if (px >= 0 && px <= window.innerWidth && py >= 0 && py <= window.innerHeight) {
      const opacity = 0.4 + Math.sin(star.twinkle) * 0.3 + (1500 - star.z) / 1500 * 0.4;
      const size = star.size * (1500 - star.z) / 1500 * 2;
      ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fill();

      // 글로우
      if (size > 1) {
        ctx.fillStyle = `rgba(180, 180, 255, ${opacity * 0.2})`;
        ctx.beginPath();
        ctx.arc(px, py, size * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  });

  if (running) animationId = requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();

// 컨트롤
document.getElementById('play').addEventListener('click', (e) => {
  running = !running;
  e.target.textContent = running ? '⏸' : '▶';
  if (running) draw();
  else cancelAnimationFrame(animationId);
});
</script>
</body>
</html>
