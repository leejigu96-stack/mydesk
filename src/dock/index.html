<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>MyDesk Dock</title>
<link rel="stylesheet" href="../common/style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100vw; height: 100vh; overflow: visible; background: transparent; }

body {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 8px;
  -webkit-app-region: no-drag;
}

/* ====== 진짜 맥 Dock — 토큰 정확히 ====== */
.dock {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  padding: 6px 8px;
  /* 맥 dock 배경: 두 단계 (vibrancy 기본 + 살짝 밝은 gradient) */
  background:
    linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.12) 100%),
    var(--dock-bg-base);
  backdrop-filter: blur(50px) saturate(180%);
  -webkit-backdrop-filter: blur(50px) saturate(180%);
  /* 둥글기 24px (맥 정확) */
  border-radius: 24px;
  /* 안쪽 1px 미세한 흰색 라인 + 외부 그림자 */
  box-shadow:
    inset 0 0 0 0.5px var(--dock-inset-border),
    var(--shadow-dock);
  position: relative;
}

.dock-item {
  position: relative;
  /* 진짜 맥 dock 아이콘 기본 크기 */
  width: 52px;
  height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  cursor: pointer;
  transform-origin: bottom center;
  user-select: none;
  flex-shrink: 0;
  will-change: transform;
  /* 미세한 안쪽 하이라이트 (맥 아이콘 느낌) */
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.18),
    0 2px 4px rgba(0, 0, 0, 0.2);
}

.dock-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

/* 실행 중 점 - 맥 정확 (작은 검정/흰 점) */
.dock-item.running::after {
  content: "";
  position: absolute;
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.85);
  box-shadow: 0 0 2px rgba(0, 0, 0, 0.2);
}

[data-theme="light"] .dock-item.running::after {
  background: rgba(0, 0, 0, 0.6);
}

/* 구분선 */
.dock-divider {
  width: 1px;
  height: 36px;
  background: var(--sys-separator);
  margin: 0 6px;
  align-self: center;
}

/* 툴팁 — 맥 정확 */
.dock-item .tooltip {
  position: absolute;
  bottom: calc(100% + 16px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(50, 50, 52, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: white;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s var(--ease);
  z-index: 100;
  border: 0.5px solid rgba(255, 255, 255, 0.12);
  letter-spacing: -0.01em;
}

.dock-item.tooltip-show .tooltip {
  opacity: 1;
  transition-delay: 0.4s;  /* 맥은 살짝 지연 */
}

/* 앱 아이콘 — 맥처럼 그라데이션 풍부 */
.app-chrome {
  background:
    radial-gradient(circle at 50% 50%, #fff 0%, #4285f4 25%, #34a853 50%, #fbbc04 75%, #ea4335 100%);
}
.app-claude {
  background: linear-gradient(135deg, #ff7a59 0%, #d4361e 100%);
}
.app-resellon {
  background: linear-gradient(135deg, #ffd93d 0%, #f59e0b 100%);
}
.app-nokki {
  background: linear-gradient(135deg, #c084fc 0%, #6366f1 100%);
}
.app-vscode {
  background: linear-gradient(135deg, #29b6f6 0%, #0277bd 100%);
  color: white;
}
.app-photoshop {
  background: linear-gradient(135deg, #001e36 0%, #31a8ff 100%);
  color: #80d8ff;
  font-weight: 800;
  font-size: 24px;
  font-family: -apple-system, sans-serif;
}
.app-kakao {
  background: linear-gradient(135deg, #ffeb3b 0%, #fbc02d 100%);
  color: #3c1e1e;
}
.app-files {
  background: linear-gradient(135deg, #80d8ff 0%, #0277bd 100%);
}
.app-settings {
  background: linear-gradient(135deg, #b0bec5 0%, #546e7a 100%);
}
.app-trash {
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.04) 100%);
  border: 0.5px solid rgba(255, 255, 255, 0.12);
}
[data-theme="light"] .app-trash {
  background: linear-gradient(135deg, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.03) 100%);
  border-color: rgba(0, 0, 0, 0.1);
}

body.auto-hide {
  transform: translateY(76px);
  transition: transform 0.3s var(--ease);
}
body.auto-hide:hover { transform: translateY(0); }
</style>
</head>
<body>
<div class="dock" id="dock">
  <div class="dock-item app-chrome running" data-app="chrome">🌐<div class="tooltip">Chrome</div></div>
  <div class="dock-item app-claude running" data-app="claude">🤖<div class="tooltip">Claude</div></div>
  <div class="dock-item app-resellon running" data-app="resellon">📦<div class="tooltip">ResellOn</div></div>
  <div class="dock-item app-nokki" data-app="nokki">✂️<div class="tooltip">누끼 GUI</div></div>
  <div class="dock-item app-vscode" data-app="vscode">💻<div class="tooltip">VS Code</div></div>
  <div class="dock-item app-photoshop" data-app="photoshop">Ps<div class="tooltip">포토샵</div></div>
  <div class="dock-item app-kakao running" data-app="kakao">💬<div class="tooltip">카카오톡</div></div>
  <div class="dock-divider"></div>
  <div class="dock-item app-files" data-app="files">📁<div class="tooltip">파일</div></div>
  <div class="dock-item app-settings" data-app="settings">⚙️<div class="tooltip">설정</div></div>
  <div class="dock-item app-trash" data-app="trash">🗑️<div class="tooltip">휴지통</div></div>
</div>

<script>
const T = window.__TAURI__;
const items = Array.from(document.querySelectorAll('.dock-item'));
const dock = document.getElementById('dock');

// 맥 magnification — frontend.fyi 분석 토큰 적용
// 마우스 가까이 = 1.5x, 인접 = 1.33x, 그 외 1.0x
let targetX = -1;
let smoothX = -1;
let active = false;
let rafId = null;

// 진짜 맥 비율
const BASE = 52;
const MAX = 88;    // 1.69x — 맥은 90px (1.5x of 60)
const NEAR = 72;   // 1.38x — 인접
const FAR_RANGE = 110;   // 영향 범위 (이 안에서만 변화)
const SMOOTH = 0.28;

dock.addEventListener('mousemove', (e) => {
  targetX = e.clientX;
  active = true;
  if (!rafId) rafId = requestAnimationFrame(tick);
});
dock.addEventListener('mouseleave', () => { active = false; });

function tick() {
  if (active) {
    if (smoothX < 0) smoothX = targetX;
    smoothX += (targetX - smoothX) * SMOOTH;
  }
  let allBase = true;
  items.forEach(item => {
    const rect = item.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    let scale = 1, lift = 0;
    if (active && smoothX > 0) {
      const dist = Math.abs(smoothX - center);
      if (dist < FAR_RANGE) {
        // cosine fall-off (맥의 부드러운 곡선)
        const factor = Math.cos((dist / FAR_RANGE) * (Math.PI / 2));
        scale = 1 + factor * (MAX / BASE - 1);
        lift = factor * 14;
      }
    }
    if (Math.abs(scale - 1) > 0.003) allBase = false;
    item.style.transform = `scale(${scale.toFixed(3)}) translateY(${-lift.toFixed(2)}px)`;
  });
  if (!active && allBase) {
    smoothX = -1;
    rafId = null;
    items.forEach(it => it.style.transform = '');
    return;
  }
  rafId = requestAnimationFrame(tick);
}

// 툴팁
items.forEach(item => {
  let timer;
  item.addEventListener('mouseenter', () => {
    timer = setTimeout(() => item.classList.add('tooltip-show'), 50);
  });
  item.addEventListener('mouseleave', () => {
    clearTimeout(timer);
    item.classList.remove('tooltip-show');
  });
});

// 클릭
items.forEach(item => {
  item.addEventListener('click', async () => {
    const app = item.dataset.app;
    const orig = item.style.transform;
    item.style.transition = 'transform 0.08s ease-out';
    item.style.transform = orig + ' scale(0.9)';
    setTimeout(() => { item.style.transition = ''; }, 100);
    if (T) {
      try {
        await T.core.invoke('launch_app', { name: app });
        item.classList.add('running');
      } catch (err) { console.error(err); }
    }
  });
});

if (T) {
  T.event.listen('theme-changed', (e) => {
    document.documentElement.dataset.theme = e.payload;
  });
  T.event.listen('config-changed', (e) => {
    if (e.payload?.dock_autohide !== undefined) {
      document.body.classList.toggle('auto-hide', e.payload.dock_autohide);
    }
  });
  T.core.invoke('get_config').then(cfg => {
    if (cfg.theme) document.documentElement.dataset.theme = cfg.theme;
    if (cfg.dock_autohide) document.body.classList.add('auto-hide');
  }).catch(() => {});
}
</script>
</body>
</html>
