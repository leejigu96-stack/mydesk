<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>MyDesk Dock</title>
<link rel="stylesheet" href="../common/style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100vw; height: 100vh; overflow: visible; background: transparent; }

body {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 6px;
  -webkit-app-region: no-drag;
}

.dock {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  padding: 5px 6px;
  background: var(--vib-bg-strong);
  backdrop-filter: blur(50px) saturate(200%);
  -webkit-backdrop-filter: blur(50px) saturate(200%);
  border: 0.5px solid var(--sys-border);
  border-radius: 18px;
  box-shadow: var(--shadow-dock);
}

.dock-item {
  position: relative;
  width: 48px;
  height: 48px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  cursor: pointer;
  transform-origin: bottom center;
  user-select: none;
  flex-shrink: 0;
  will-change: transform;
  overflow: hidden;
  /* 부드러운 transition은 raf에서 직접 제어 */
}

.dock-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

/* 실행 중 점 (맥처럼 작은 흰 점, 독 바닥에) */
.dock-item.running::after {
  content: "";
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.75);
}

[data-theme="light"] .dock-item.running::after {
  background: rgba(0, 0, 0, 0.5);
}

/* 구분선 (시스템 / 휴지통 영역 분리) */
.dock-divider {
  width: 1px;
  height: 32px;
  background: var(--sys-separator);
  margin: 0 4px;
  align-self: center;
}

/* 툴팁 — 맥 스타일 */
.dock-item .tooltip {
  position: absolute;
  bottom: calc(100% + 18px);
  left: 50%;
  transform: translateX(-50%) translateY(2px);
  background: rgba(40, 40, 42, 0.92);
  backdrop-filter: blur(20px);
  color: white;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.12s var(--ease), transform 0.12s var(--ease);
  z-index: 100;
  border: 0.5px solid rgba(255, 255, 255, 0.1);
}

.dock-item.tooltip-show .tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  transition-delay: 0.35s;
}

/* 앱 아이콘 배경 */
.app-chrome { background: linear-gradient(135deg, #4285f4 0%, #34a853 33%, #fbbc04 66%, #ea4335 100%); }
.app-claude { background: linear-gradient(135deg, #ff7a59 0%, #ff4940 100%); }
.app-resellon { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
.app-nokki { background: linear-gradient(135deg, #af52de 0%, #5e5ce6 100%); }
.app-vscode { background: linear-gradient(135deg, #007acc 0%, #0066b8 100%); color: white; }
.app-photoshop { background: linear-gradient(135deg, #001e36 0%, #31a8ff 100%); color: white; font-weight: 800; font-size: 22px; font-family: -apple-system, sans-serif; }
.app-kakao { background: linear-gradient(135deg, #fee500 0%, #fbc02d 100%); color: #3c1e1e; }
.app-files { background: linear-gradient(135deg, #5ac8fa 0%, #007aff 100%); }
.app-settings { background: linear-gradient(135deg, #8e8e93 0%, #636366 100%); }
.app-trash {
  background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
  border: 0.5px solid rgba(255, 255, 255, 0.08);
}
[data-theme="light"] .app-trash {
  background: linear-gradient(135deg, rgba(0,0,0,0.05), rgba(0,0,0,0.02));
  border-color: rgba(0, 0, 0, 0.08);
}

/* 자동 숨김 */
body.auto-hide {
  transform: translateY(72px);
  transition: transform 0.3s var(--ease);
}
body.auto-hide:hover { transform: translateY(0); }
</style>
</head>
<body>
<div class="dock" id="dock">
  <div class="dock-item app-chrome running" data-name="Chrome" data-app="chrome">🌐<div class="tooltip">Chrome</div></div>
  <div class="dock-item app-claude running" data-name="Claude" data-app="claude">🤖<div class="tooltip">Claude</div></div>
  <div class="dock-item app-resellon running" data-name="ResellOn" data-app="resellon">📦<div class="tooltip">ResellOn</div></div>
  <div class="dock-item app-nokki" data-name="누끼 GUI" data-app="nokki">✂️<div class="tooltip">누끼 GUI</div></div>
  <div class="dock-item app-vscode" data-name="VS Code" data-app="vscode">💻<div class="tooltip">VS Code</div></div>
  <div class="dock-item app-photoshop" data-name="포토샵" data-app="photoshop">Ps<div class="tooltip">포토샵</div></div>
  <div class="dock-item app-kakao running" data-name="카카오톡" data-app="kakao">💬<div class="tooltip">카카오톡</div></div>
  <div class="dock-divider"></div>
  <div class="dock-item app-files" data-name="파일 탐색기" data-app="files">📁<div class="tooltip">파일 탐색기</div></div>
  <div class="dock-item app-settings" data-name="MyDesk 설정" data-app="settings">⚙️<div class="tooltip">MyDesk 설정</div></div>
  <div class="dock-item app-trash" data-name="휴지통" data-app="trash">🗑️<div class="tooltip">휴지통</div></div>
</div>

<script>
const T = window.__TAURI__;
const items = Array.from(document.querySelectorAll('.dock-item'));
const dock = document.getElementById('dock');

// 맥 dock magnification — 가까운 1~2개만 부드럽게
let targetX = -1;
let smoothX = -1;
let active = false;
let rafId = null;

const MAX_SCALE = 1.55;
const SIGMA = 35;          // 좁은 영향 범위 (맥과 비슷)
const LIFT_MAX = 8;
const SMOOTH = 0.22;

dock.addEventListener('mousemove', (e) => {
  targetX = e.clientX;
  active = true;
  if (!rafId) rafId = requestAnimationFrame(tick);
});
dock.addEventListener('mouseleave', () => {
  active = false;
});

function tick() {
  if (active) {
    if (smoothX < 0) smoothX = targetX;
    smoothX += (targetX - smoothX) * SMOOTH;
  }
  let allBase = true;
  items.forEach(item => {
    const rect = item.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    let scale = 1, lift = 0;
    if (active && smoothX > 0) {
      const dist = Math.abs(smoothX - center);
      const factor = Math.exp(-(dist * dist) / (2 * SIGMA * SIGMA));
      scale = 1 + factor * (MAX_SCALE - 1);
      lift = factor * LIFT_MAX;
    }
    if (Math.abs(scale - 1) > 0.003) allBase = false;
    item.style.transform = `scale(${scale.toFixed(3)}) translateY(${-lift.toFixed(2)}px)`;
  });
  if (!active && allBase) {
    smoothX = -1;
    rafId = null;
    items.forEach(it => it.style.transform = '');
    return;
  }
  rafId = requestAnimationFrame(tick);
}

// 툴팁 (호버 후 살짝 지연)
items.forEach(item => {
  let tipTimer;
  item.addEventListener('mouseenter', () => {
    tipTimer = setTimeout(() => item.classList.add('tooltip-show'), 50);
  });
  item.addEventListener('mouseleave', () => {
    clearTimeout(tipTimer);
    item.classList.remove('tooltip-show');
  });
});

// 클릭 → 앱 실행 + 점프
items.forEach(item => {
  item.addEventListener('click', async () => {
    const app = item.dataset.app;
    // 살짝 누름
    item.style.transition = 'transform 0.08s ease-out';
    item.style.transform = (item.style.transform || 'scale(1)') + ' scale(0.92)';
    setTimeout(() => {
      item.style.transition = '';
    }, 100);

    if (T) {
      try {
        await T.core.invoke('launch_app', { name: app });
        item.classList.add('running');
      } catch (err) { console.error('실행 실패:', err); }
    }
  });
});

// 테마/설정 sync
if (T) {
  T.event.listen('theme-changed', (e) => {
    document.documentElement.dataset.theme = e.payload;
  });
  T.event.listen('config-changed', (e) => {
    if (e.payload?.dock_autohide !== undefined) {
      document.body.classList.toggle('auto-hide', e.payload.dock_autohide);
    }
  });
  T.core.invoke('get_config').then(cfg => {
    if (cfg.theme) document.documentElement.dataset.theme = cfg.theme;
    if (cfg.dock_autohide) document.body.classList.add('auto-hide');
  }).catch(() => {});
}
</script>
</body>
</html>
