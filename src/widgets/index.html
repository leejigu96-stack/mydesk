<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>MyDesk Widgets</title>
<link rel="stylesheet" href="../common/style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; }

body {
  padding: 14px;
  transition: opacity 0.25s var(--ease);
  opacity: 0.62;
}
body:hover { opacity: 1; }

.widgets {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 232px;
}

/* 맥 위젯 — 둥글고 깔끔한 카드 */
.widget {
  background: var(--vib-bg-strong);
  backdrop-filter: blur(50px) saturate(180%);
  -webkit-backdrop-filter: blur(50px) saturate(180%);
  border: 0.5px solid var(--sys-border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

/* ========== 시계 위젯 (맥 시계 위젯 따라함) ========== */
.w-clock {
  padding: 18px 20px 16px;
}

.clock-time {
  font-family: -apple-system, "SF Pro Display", "Pretendard", system-ui;
  font-size: 52px;
  font-weight: 200;
  letter-spacing: -0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.clock-time .colon {
  opacity: 0.65;
  margin: 0 -2px;
}

.clock-date {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: -0.005em;
}

/* ========== 누끼 위젯 ========== */
.w-nokki {
  padding: 14px 16px 16px;
}

.w-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.w-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: -0.005em;
  display: flex;
  align-items: center;
  gap: 5px;
}

.w-title .icon { font-size: 12px; }

.w-action {
  font-size: 10px;
  color: var(--text-tertiary);
}

.nokki-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.nokki-stat {
  flex: 1;
  text-align: left;
}

.nokki-stat-num {
  font-family: -apple-system, "SF Pro Display", system-ui;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  line-height: 1;
}

.nokki-stat-label {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-top: 3px;
  font-weight: 500;
}

.nokki-progress {
  height: 3px;
  background: var(--vib-tint);
  border-radius: 2px;
  overflow: hidden;
}

.nokki-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s var(--ease);
}

/* ========== Claude 위젯 ========== */
.w-claude {
  padding: 14px 16px 16px;
}

.claude-main {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 4px;
}

.claude-num {
  font-family: -apple-system, "SF Pro Display", system-ui;
  font-size: 32px;
  font-weight: 300;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  line-height: 1;
}

.claude-label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}

.claude-sub {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-tertiary);
}

.claude-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #34c759;
  box-shadow: 0 0 4px rgba(52, 199, 89, 0.6);
}

/* ========== 메모 ========== */
.w-memo {
  padding: 14px 16px 14px;
}

.memo {
  width: 100%;
  min-height: 60px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 12.5px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.45;
  margin-top: 6px;
}

.memo::placeholder { color: var(--text-tertiary); }

/* 라이트 모드 시계 */
[data-theme="light"] .clock-time {
  color: rgba(0,0,0,0.88);
}
</style>
</head>
<body>
<div class="widgets">

  <!-- 시계 -->
  <div class="widget w-clock">
    <div class="clock-time">
      <span id="hh">--</span><span class="colon">:</span><span id="mm">--</span>
    </div>
    <div class="clock-date" id="date">로딩 중</div>
  </div>

  <!-- 누끼 -->
  <div class="widget w-nokki">
    <div class="w-header">
      <div class="w-title"><span class="icon">✂︎</span> 누끼</div>
      <div class="w-action" id="nokki-action">대기</div>
    </div>
    <div class="nokki-row">
      <div class="nokki-stat">
        <div class="nokki-stat-num" id="n-pending">0</div>
        <div class="nokki-stat-label">대기</div>
      </div>
      <div class="nokki-stat">
        <div class="nokki-stat-num" id="n-done">0</div>
        <div class="nokki-stat-label">완료</div>
      </div>
      <div class="nokki-stat">
        <div class="nokki-stat-num" id="n-err">0</div>
        <div class="nokki-stat-label">오류</div>
      </div>
    </div>
    <div class="nokki-progress"><div class="nokki-bar" id="n-bar"></div></div>
  </div>

  <!-- Claude -->
  <div class="widget w-claude">
    <div class="w-header">
      <div class="w-title"><span class="icon">●</span> Claude</div>
    </div>
    <div class="claude-main">
      <span class="claude-num" id="c-count">0</span>
      <span class="claude-label">세션 활성</span>
    </div>
    <div class="claude-sub">
      <span class="claude-dot"></span>
      <span id="c-sub">대기 중</span>
    </div>
  </div>

  <!-- 메모 -->
  <div class="widget w-memo">
    <div class="w-header">
      <div class="w-title"><span class="icon">✎</span> 메모</div>
      <div class="w-action" id="memo-status">저장됨</div>
    </div>
    <textarea class="memo" id="memo" placeholder="간단한 메모..."></textarea>
  </div>

</div>

<script>
const T = window.__TAURI__;

function pad(n) { return String(n).padStart(2, '0'); }

function updateClockLocal() {
  const now = new Date();
  document.getElementById('hh').textContent = pad(now.getHours());
  document.getElementById('mm').textContent = pad(now.getMinutes());
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('date').textContent =
    `${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
}

async function refreshData() {
  if (!T) { updateClockLocal(); return; }
  try {
    const d = await T.core.invoke('get_widget_data');

    // 시계
    const [hh, mm] = d.clock_time.split(':');
    document.getElementById('hh').textContent = hh;
    document.getElementById('mm').textContent = mm;
    // 짧은 날짜만 (5월 26일 화요일 식)
    const dateMatch = d.clock_date.match(/(\d+)월 (\d+)일 (.)요일/);
    if (dateMatch) {
      document.getElementById('date').textContent = `${dateMatch[1]}월 ${dateMatch[2]}일 ${dateMatch[3]}요일`;
    } else {
      document.getElementById('date').textContent = d.clock_date;
    }

    // 누끼
    document.getElementById('n-pending').textContent = d.nokki_pending;
    document.getElementById('n-done').textContent = d.nokki_done;
    document.getElementById('n-err').textContent = d.nokki_errors;
    const total = d.nokki_pending + d.nokki_done + d.nokki_errors;
    const pct = total > 0 ? Math.round(d.nokki_done / total * 100) : 0;
    document.getElementById('n-bar').style.width = pct + '%';
    document.getElementById('nokki-action').textContent =
      d.nokki_pending > 0 ? '진행 중' : '대기';

    // Claude
    document.getElementById('c-count').textContent = d.claude_count;
    document.getElementById('c-sub').textContent =
      d.claude_count > 0 ? `${d.claude_count}개 작업 중` : '대기 중';

  } catch (err) { console.error(err); updateClockLocal(); }
}

updateClockLocal();
refreshData();
setInterval(updateClockLocal, 1000);
setInterval(refreshData, 30000);

// 메모 저장
const memoEl = document.getElementById('memo');
const memoStatus = document.getElementById('memo-status');
memoEl.value = localStorage.getItem('mydesk-memo') || '';
let memoTimer;
memoEl.addEventListener('input', () => {
  memoStatus.textContent = '저장 중...';
  clearTimeout(memoTimer);
  memoTimer = setTimeout(() => {
    localStorage.setItem('mydesk-memo', memoEl.value);
    memoStatus.textContent = '저장됨';
  }, 400);
});

// 테마 sync
if (T) {
  T.event.listen('theme-changed', (e) => {
    document.documentElement.dataset.theme = e.payload;
  });
  T.core.invoke('get_config').then(cfg => {
    if (cfg.theme) document.documentElement.dataset.theme = cfg.theme;
  }).catch(() => {});
}
</script>
</body>
</html>
