<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MyDesk Widgets</title>
<link rel="stylesheet" href="../common/style.css">
<style>
body {
  background: transparent;
  padding: 20px;
  -webkit-app-region: drag;
}

.widget-container {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 280px;
}

.widget {
  background: var(--bg-glass);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  box-shadow: var(--shadow-lg);
  -webkit-app-region: no-drag;
  transition: all 0.2s var(--ease);
}

.widget:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
}

.widget-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.widget-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}

.widget-icon { font-size: 14px; }

/* 시계 위젯 */
.clock-time {
  font-size: 56px;
  font-weight: 200;
  letter-spacing: -0.04em;
  line-height: 1;
  background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 4px;
}

.clock-seconds { font-size: 28px; opacity: 0.5; }

.clock-date {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 6px;
}

/* 매출 위젯 */
.sales-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.sales-item {
  padding: 12px;
  background: rgba(0, 0, 0, 0.25);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-soft);
}

.sales-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}

.sales-amount {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.sales-delta {
  font-size: 11px;
  margin-top: 2px;
}

.sales-delta.up { color: var(--success); }
.sales-delta.down { color: var(--danger); }

/* 누끼 큐 위젯 */
.queue-stats {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
}

.queue-stat {
  flex: 1;
}

.queue-stat-num {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.queue-stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

.queue-progress {
  height: 6px;
  background: var(--bg-glass-light);
  border-radius: 3px;
  overflow: hidden;
}

.queue-bar {
  height: 100%;
  background: var(--accent-grad);
  border-radius: 3px;
  width: 65%;
  transition: width 0.5s var(--ease);
}

.queue-progress-text {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 6px;
  text-align: right;
}

/* Claude 모니터 */
.claude-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.claude-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}

.claude-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}

.claude-dot.idle { background: var(--warning); }
.claude-dot.off { background: var(--text-tertiary); }

.claude-name { flex: 1; font-size: 13px; }
.claude-status { font-size: 11px; color: var(--text-tertiary); }

/* 날씨 위젯 */
.weather-main {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 8px;
}

.weather-icon { font-size: 48px; }

.weather-temp {
  font-size: 36px;
  font-weight: 300;
  letter-spacing: -0.02em;
}

.weather-info {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-soft);
  font-size: 12px;
  color: var(--text-secondary);
}

/* 메모 위젯 */
.memo {
  width: 100%;
  min-height: 80px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.5;
}

.memo::placeholder { color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="widget-container">

  <!-- 시계 -->
  <div class="widget">
    <div class="widget-header">
      <div class="widget-title"><span class="widget-icon">🕐</span> 시계</div>
    </div>
    <div class="clock-time"><span id="clock-hm">23:47</span><span class="clock-seconds" id="clock-s">:23</span></div>
    <div class="clock-date" id="clock-date">2026년 5월 25일 일요일</div>
  </div>

  <!-- ResellOn 매출 -->
  <div class="widget">
    <div class="widget-header">
      <div class="widget-title"><span class="widget-icon">💰</span> ResellOn 매출</div>
      <div class="text-sm pulse">LIVE</div>
    </div>
    <div class="sales-grid">
      <div class="sales-item">
        <div class="sales-label">오늘</div>
        <div class="sales-amount">₩2,340,000</div>
        <div class="sales-delta up">▲ 12.4%</div>
      </div>
      <div class="sales-item">
        <div class="sales-label">이번주</div>
        <div class="sales-amount">₩18,420,000</div>
        <div class="sales-delta up">▲ 8.1%</div>
      </div>
    </div>
  </div>

  <!-- 누끼 큐 -->
  <div class="widget">
    <div class="widget-header">
      <div class="widget-title"><span class="widget-icon">✂️</span> 누끼 작업</div>
      <span class="badge badge-success">진행 중</span>
    </div>
    <div class="queue-stats">
      <div class="queue-stat">
        <div class="queue-stat-num">12</div>
        <div class="queue-stat-label">대기</div>
      </div>
      <div class="queue-stat">
        <div class="queue-stat-num">87</div>
        <div class="queue-stat-label">완료</div>
      </div>
      <div class="queue-stat">
        <div class="queue-stat-num">2</div>
        <div class="queue-stat-label">오류</div>
      </div>
    </div>
    <div class="queue-progress">
      <div class="queue-bar"></div>
    </div>
    <div class="queue-progress-text">87 / 134 (65%)</div>
  </div>

  <!-- Claude 모니터 -->
  <div class="widget">
    <div class="widget-header">
      <div class="widget-title"><span class="widget-icon">🤖</span> Claude 세션</div>
      <div class="text-sm">8개 활성</div>
    </div>
    <div class="claude-list">
      <div class="claude-row">
        <div class="claude-dot"></div>
        <div class="claude-name">Claude 4 (모바일)</div>
        <div class="claude-status">작업 중</div>
      </div>
      <div class="claude-row">
        <div class="claude-dot"></div>
        <div class="claude-name">사이트 클로드 1</div>
        <div class="claude-status">빌드 중</div>
      </div>
      <div class="claude-row">
        <div class="claude-dot idle"></div>
        <div class="claude-name">사이트 클로드 2</div>
        <div class="claude-status">대기</div>
      </div>
      <div class="claude-row">
        <div class="claude-dot"></div>
        <div class="claude-name">누끼 클로드</div>
        <div class="claude-status">처리 중</div>
      </div>
      <div class="claude-row">
        <div class="claude-dot idle"></div>
        <div class="claude-name">Tauri 클로드</div>
        <div class="claude-status">대기</div>
      </div>
    </div>
  </div>

  <!-- 날씨 -->
  <div class="widget">
    <div class="widget-header">
      <div class="widget-title"><span class="widget-icon">☁️</span> 울산 남구</div>
    </div>
    <div class="weather-main">
      <div class="weather-icon">⛅</div>
      <div>
        <div class="weather-temp">19°</div>
        <div class="text-sm">구름 조금</div>
      </div>
    </div>
    <div class="weather-info">
      <div>최고 23° · 최저 14°</div>
      <div>습도 62%</div>
    </div>
  </div>

  <!-- 메모 -->
  <div class="widget">
    <div class="widget-header">
      <div class="widget-title"><span class="widget-icon">📝</span> 메모</div>
    </div>
    <textarea class="memo" placeholder="빠른 메모..."></textarea>
  </div>

</div>

<script>
// 시계 업데이트
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock-hm').textContent = `${hh}:${mm}`;
  document.getElementById('clock-s').textContent = `:${ss}`;

  const days = ['일','월','화','수','목','금','토'];
  const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
  document.getElementById('clock-date').textContent = dateStr;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
